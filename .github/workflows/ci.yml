name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-check:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Check for unwrap() in production code
        run: |
          if grep -rn 'unwrap()' crates/*/src/*.rs crates/*/src/**/*.rs 2>/dev/null | grep -v '#\[cfg(test)\]' | grep -v 'mod tests' | grep -v '\.expect(' | head -20 | grep -q '.'; then
            echo "WARNING: Found unwrap() calls in production code (review above)"
          fi

      - name: Check for HashMap in simulation.rs
        run: |
          if grep -n 'HashMap' crates/battleground-core/src/simulation.rs | grep -v '#\[cfg(test)\]' | grep -q '.'; then
            echo "ERROR: HashMap found in simulation.rs (must use BTreeMap for determinism)"
            exit 1
          fi

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build WASM
        run: wasm-pack build crates/battleground-wasm --target web --out-dir ../../client/src/wasm/pkg

      - name: Check WASM bundle size
        run: |
          SIZE=$(stat -c%s client/src/wasm/pkg/battleground_wasm_bg.wasm 2>/dev/null || stat -f%z client/src/wasm/pkg/battleground_wasm_bg.wasm)
          echo "WASM bundle size: ${SIZE} bytes"
          if [ "$SIZE" -gt 524288 ]; then
            echo "WARNING: WASM bundle exceeds 512KB ($SIZE bytes)"
          fi

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: client/src/wasm/pkg/

  client-check:
    name: Client Checks
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: client/src/wasm/pkg/

      - name: Install dependencies
        run: pnpm --prefix client install

      - name: Type check
        run: pnpm --prefix client type-check

      - name: Lint
        run: pnpm --prefix client lint

      - name: Run tests
        run: pnpm --prefix client test

      - name: Build
        run: pnpm --prefix client build

      - name: Check bundle size
        run: |
          du -sh client/dist/
          echo "JS bundle breakdown:"
          ls -lh client/dist/assets/*.js 2>/dev/null || true

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    needs: client-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install client dependencies
        run: pnpm --prefix client install

      - name: Install Playwright Chromium
        run: pnpm --prefix client exec playwright install --with-deps chromium

      - name: Run Docker smoke
        run: ./scripts/smoke-docker.sh
